name: creative_os
description: A personal creative operating system + CRM for filmmakers.
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
  dependencies:
    flutter:
        sdk: flutter
          sqflite: ^2.3.0
            path: ^1.8.3
              shared_preferences: ^2.2.2
                dio: ^5.4.0
                  provider: ^6.1.1
                    firebase_core: ^2.24.2
                      firebase_messaging: ^14.7.10
                        flutter_local_notifications: ^16.3.0
                          url_launcher: ^6.2.1
                            intl: ^0.19.0
                              google_fonts: ^6.1.0
                                font_awesome_flutter: ^10.6.0
                                  uuid: ^4.2.1
                                  dev_dependencies:
                                    flutter_test:
                                        sdk: flutter
                                          flutter_lints: ^3.0.0
                                          flutter:
                                            uses-material-design: true
                                              assets:
                                                  - assets/images/
                                                      - assets/icons/
                                                          - assets/fonts/
                                                            fonts:
                                                                - family: PlayfairDisplay
                                                                      fonts:
                                                                              - asset: assets/fonts/PlayfairDisplay-Bold.ttf
                                                                                        weight: 700
                                                                                            - family: Inter
                                                                                                  fonts:
                                                                                                          - asset: assets/fonts/Inter-Regular.ttf
                                                                                                                  - asset: assets/fonts/Inter-Bold.ttf
                                                                                                                            weight: 700
                                                                                                                            
